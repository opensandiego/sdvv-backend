name: Dispatch TypeORM Command

on:
  workflow_dispatch:
    inputs:
      command:
        description: TypeORM Command
        default: migration:show
        type: choice
        options:
          - schema:log
          - migration:show
          - migration:run
          - migration:revert

      environment:
        description: Environment
        default: staging
        type: choice
        options:
          - staging
          - production

jobs:
  dispatch-typeorm-command:
    name: Run TypeORM command ${{ inputs.command }} on ${{ inputs.environment }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Install Heroku CLI
        run: |
          curl https://cli-assets.heroku.com/install.sh | sh

      - name: set App id for staging
        if: ${{ inputs.environment == 'staging' }}
        run: echo "APP_ID=$(echo $APP_ID)" >> $GITHUB_ENV
        shell: bash
        env:
          APP_ID: ${{ secrets.STAGING_HEROKU_APP_ID }}

      - name: set App id for production
        if: ${{ inputs.environment == 'production' }}
        run: echo "APP_ID=$(echo $APP_ID)" >> $GITHUB_ENV
        shell: bash
        env:
          APP_ID: ${{ secrets.PRODUCTION_HEROKU_APP_ID }}

      - id: typeorm
        uses: ./.github/actions/typeorm
        with:
          command: ${{ inputs.command }}
          APP_ID: ${{ env.APP_ID }}
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
